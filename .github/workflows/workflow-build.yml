name: Test, Build and Release
run-name: Test, Build and Release ${{ inputs['release-version'] }}

on:
  workflow_call:
    inputs:
      release-version:
        description: 'The version to release (e.g., 1.2.3). The "v" prefix is added automatically.'
        required: false
        type: string
      app-name:
        description: "Name of the app (used for Artifacts)"
        required: false
        type: string
      build-type:
        description: "Type of build (test, build, size-analysis, release)"
        required: false
        type: string
        default: "test"
      java-version:
        description: "Version of Java to use for build"
        required: false
        default: "21"
        type: string
      working-directory:
        description: "The directory to run the workflow in (relative to the repository root)"
        required: false
        default: "."
        type: string
      bot-app-id:
        description: "GitHub App ID for Release creation"
        required: false
        type: string
    secrets:
      KEY_PASSWORD:
        required: false
      KEYSTORE_PASSWORD:
        required: false
      KEY_ALIAS:
        required: false
      KEYSTORE_BASE64:
        required: false
      BOT_APP_PRIVATE_KEY:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Format, analyze and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs['working-directory'] }}

    steps:
      - name: Checkout app repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          flutter-version-file: ${{ inputs['working-directory'] }}/pubspec.yaml
          cache: true

      - name: Install pub dependencies
        run: flutter pub get

      - name: Check dart format
        run: dart format --set-exit-if-changed .

      - name: Analyze flutter
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build:
    name: Build app
    needs: test
    if: ${{ ( startsWith(github.ref, 'refs/tags/')
      || contains(github.event.pull_request.labels.*.name, '⚗️ Request Build')
      || contains(fromJson('["build","size-analysis","release"]'), inputs['build-type']) ) }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs['working-directory'] }}

    outputs:
      version_name: ${{ steps.build_options.outputs.version_name }}

    steps:
      - name: Checkout app repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          flutter-version-file: ${{ inputs['working-directory'] }}/pubspec.yaml
          cache: true

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: ${{ inputs['java-version'] }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Update pubspec.yaml version
        if: inputs['build-type'] == 'release' && inputs['release-version']
        run: |
          flutter pub global activate pub_version_plus
          pubversion set ${{ inputs['release-version'] }}

      - name: Install pub dependencies
        run: flutter pub get

      - name: Set up keystore
        id: keystore
        if: ${{ github.event.pull_request.head.repo.fork == false }}
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Keystore secret is empty, skipping signing."
            exit 0
          fi
          {
            echo keyPassword=${{ secrets.KEY_PASSWORD }}
            echo storePassword=${{ secrets.KEYSTORE_PASSWORD }}
            echo keyAlias=${{ secrets.KEY_ALIAS }}
          } > android/key.properties
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks
          echo "signing_available=true" >> "$GITHUB_OUTPUT"

      - name: Set build options
        id: build_options
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          VERSION="${{ github.event.inputs['release-version'] }}"
          VERSION_NAME="${VERSION:-$(echo "$GITHUB_REF_NAME" | tr / _)}_${SHORT_SHA}"
          VERSION_NAME="$(echo "$GITHUB_REF_NAME" | tr / _)_$SHORT_SHA"
          FLAVOR="${{ inputs['build-type'] == 'release' && 'production' || 'staging' }}"
          SKIP_SIGN="${{ steps.keystore.outputs.signing_available != 'true' && '-PskipSigning=true' || '' }}"
          {
            echo "flavor=$FLAVOR"
            echo "version_name=$VERSION_NAME"
            echo "build_args=--release --flavor $FLAVOR --dart-define=GIT_COMMIT=$SHORT_SHA --obfuscate --split-debug-info=build/app/symbols $SKIP_SIGN"
          } >> "$GITHUB_OUTPUT"

      - name: Build APK
        run: flutter build apk ${{ steps.build_options.outputs.build_args }} --split-per-abi

      - name: Build app bundle
        run: flutter build appbundle ${{ steps.build_options.outputs.build_args }}

      - name: Build APK for size analysis
        if: inputs['build-type'] == 'size-analysis'
        run: flutter build apk ${{ steps.build_options.outputs.build_args }} --analyze-size --target-platform android-arm64

      - name: Upload APK arm64-v8a
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs['app-name'] }}_${{ steps.build_options.outputs.version_name }}_arm64-v8a.apk
          path: ${{ github.workspace }}/build/app/outputs/flutter-apk/app-arm64-v8a-${{ steps.build_options.outputs.flavor }}-release.apk
          archive: false

      - name: Upload APK armeabi-v7a
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs['app-name'] }}_${{ steps.build_options.outputs.version_name }}_armeabi-v7a.apk
          path: ${{ github.workspace }}/build/app/outputs/flutter-apk/app-armeabi-v7a-${{ steps.build_options.outputs.flavor }}-release.apk
          archive: false

      - name: Upload APK x86_64
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs['app-name'] }}_${{ steps.build_options.outputs.version_name }}_x86_64.apk
          path: ${{ github.workspace }}/build/app/outputs/flutter-apk/app-x86_64-${{ steps.build_options.outputs.flavor }}-release.apk
          archive: false

      - name: Upload app bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs['app-name'] }}_${{ steps.build_options.outputs.version_name }}.aab
          path: ${{ github.workspace }}/build/app/outputs/bundle/${{ steps.build_options.outputs.flavor }}Release/app-${{ steps.build_options.outputs.flavor }}-release.aab
          archive: false

      - name: Upload symbols file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs['app-name'] }}_${{ steps.build_options.outputs.version_name }}_symbols
          path: build/app/symbols

      - name: Upload size analysis apk
        if: inputs['build-type'] == 'size-analysis'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: /home/runner/.flutter-devtools/apk-code-size-analysis_01.json
          archive: false

      - name: Upload pubspec.yaml
        if: inputs['build-type'] == 'release' && inputs['release-version']
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ github.workspace }}/pubspec.yaml
          archive: false

  post-build:
    name: Post build
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Remove build request label
        if: ${{ contains(github.event.pull_request.labels.*.name, '⚗️ Request Build') }}
        uses: IamPekka058/removeLabels@82c8d070189f04448d6ffe291a0e398c2a749a09 # v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: "⚗️ Request Build"

      - name: Comment artifact links
        if: github.event_name == 'pull_request'
        uses: RubberDuckCrew/artifact2pr@1d2777cac9898de6a6cb16eb32b5c738ea428787 # v1.1.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-if-no-artifacts: true

  release:
    name: Create release
    needs: build
    if: inputs['build-type'] == 'release' && inputs['release-version']
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check if secrets are available
        id: check-secrets
        run: |
          echo "secrets_available=${{
            inputs['bot-app-id'] &&
            secrets.BOT_APP_PRIVATE_KEY &&
            'true' || ''
          }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        if: ${{ steps.check-secrets.outputs.secrets_available }}
        id: app-token
        with:
          client-id: ${{ inputs['bot-app-id'] }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Download pubspec.yaml
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pubspec.yaml

      - name: Commit pubspec.yaml
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        with:
          commit_message: "🔖 Release v${{ inputs['release-version'] }} [skip ci]"
          files: "${{ inputs['working-directory'] }}/pubspec.yaml"
          github_token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          fail_on_self_push: false

      - name: Download APK artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: ${{ inputs['app-name'] }}_${{ needs.build.outputs.version_name }}_*.apk
          merge-multiple: true

      - name: Download app bundle artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs['app-name'] }}_${{ needs.build.outputs.version_name }}.aab
          path: release-assets

      - name: Download symbols artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs['app-name'] }}_${{ needs.build.outputs.version_name }}_symbols
          path: release-assets/symbols

      - name: Zip symbols folder
        run: |
          zip -r "release-assets/${{ inputs['app-name'] }}_${{ needs.build.outputs.version_name }}_Symbols.zip" release-assets/symbols

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: "v${{ inputs['release-version'] }}"
          name: "🔖 v${{ inputs['release-version'] }}"
          draft: true
          prerelease: false
          files: |
            release-assets/*.apk
            release-assets/*.aab
            release-assets/*.zip
