name: Check and Release

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "The version to release (e.g., 1.2.3). The 'v' prefix is added automatically."
        required: true

jobs:
  actionlint:
    uses: RubberDuckCrew/.github/.github/workflows/action-actionlint.yml@36c7e2a2d20f2617610ed1d4c15c9e83f156d961 # v2.5.0

  codelint:
    name: Code Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run lint

  release:
    name: Release
    if: github.event_name == 'workflow_dispatch'
    needs: [actionlint, codelint]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event.inputs.version }}

    steps:
      - name: Validate version input
        run: |
          if ! echo "$VERSION" | grep -E -x '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$' >/dev/null; then
            echo "ERROR: VERSION is not a valid semver: '$VERSION'"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "🔖 flutter-workflow ${{ env.VERSION }}"
          draft: true
          prerelease: false
