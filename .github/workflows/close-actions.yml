name: Close Actions

on:
  issues:
    types: [closed]
  pull_request:
    types: [closed]

jobs:
  run:
    uses: RubberDuckCrew/.github/.github/workflows/action-close-actions.yml@9359cf3f39584573a76ae17b2efc76b192c5050e # v2.3.0
    permissions:
      issues: write
      pull-requests: write
      actions: write

  cleanup:
    name: Cleanup from previous test runs
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete previous test release
        run: gh release delete vtest-${{ github.ref_name }} --cleanup-tag -y || echo "No previous release to delete"
