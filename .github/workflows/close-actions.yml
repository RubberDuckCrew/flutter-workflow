name: Close Actions

on:
  issues:
    types: [closed]
  pull_request:
    types: [closed]

jobs:
  run:
    uses: RubberDuckCrew/.github/.github/workflows/action-close-actions.yml@30672d8a7c23d5931f89360cc50ce44a81337755 # v2.5.1
    permissions:
      issues: write
      pull-requests: write
      actions: write

  cleanup:
    name: Cleanup from previous test runs
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Delete previous test release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete vtest-${{ github.ref_name }} --cleanup-tag -y || echo "No previous release to delete"
