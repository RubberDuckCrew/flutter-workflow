name: Close Actions

on:
  issues:
    types: [closed]
  pull_request:
    types: [closed]

jobs:
  run:
    uses: RubberDuckCrew/.github/.github/workflows/action-close-actions.yml@36c7e2a2d20f2617610ed1d4c15c9e83f156d961 # v2.5.0
    permissions:
      issues: write
      pull-requests: write
      actions: write

  cleanup:
    name: Cleanup from previous test runs
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Delete previous test release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete vtest-${{ github.ref_name }} --cleanup-tag -y || echo "No previous release to delete"
