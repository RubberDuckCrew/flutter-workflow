name: Test App Workflow

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      build-type:
        description: "Type of build (test, build)"
        required: false
        type: choice
        default: "build"
        options:
          - test
          - build

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    name: Cleanup from previous test runs
    runs-on: ubuntu-latest
    steps:
      - name: Delete previous test release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete vtest-${{ github.ref_name }} --cleanup-tag -y || echo "No previous release to delete"

  test:
    uses: ./.github/workflows/workflow-build.yml
    with:
      app-name: "test_app"
      build-type: ${{ github.event.inputs['build-type'] || 'release' }}
      release-version: "test-${{ github.ref_name }}"
      working-directory: "test_app"
      java-version: "21"
      skip-version-update: true
