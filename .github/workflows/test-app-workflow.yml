name: Test App Workflow

on:
  push:
    branches: [main]
    paths:
      - "test_app/**"
      - ".github/workflows/test-app-workflow.yml"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      build-type:
        description: "Type of build (test, build)"
        required: false
        type: choice
        default: "build"
        options:
          - test
          - build

permissions:
  contents: write
  pull-requests: write

jobs:
  test-app:
    uses: ./.github/workflows/workflow-build.yml
    with:
      app-name: "test_app"
      build-type: ${{ github.event.inputs['build-type'] || 'release' }}
      release-version: "test"
      working-directory: "test_app"
      java-version: "21"
